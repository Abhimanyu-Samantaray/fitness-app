eureka:
  client:
    service-url:
      # Use an environment variable for the Eureka URL
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8084/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    # On Render, it's often better to use the service name
    # provided by Render as the hostname
    hostname: ${RENDER_EXTERNAL_HOSTNAME}
    prefer-ip-address: false


