spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USERSERVICE
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://ACTIVITYSERVICE
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://AISERVICE
          predicates:
            - Path=/api/recommendation/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true


server:
  port: ${PORT:8080}
